services:
  # Local PostgreSQL — mirrors the Supabase schema for development.
  # Migrations in app/internal/db/migrations/ are applied automatically
  # on first `docker compose up` via docker-entrypoint-initdb.d.
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: bank_transactions
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./app/internal/db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # PostgREST — exposes the local DB as a REST API on port 3000,
  # matching the Supabase PostgREST interface used by the app.
  # Set SUPABASE_URL=http://localhost:3000 and SUPABASE_KEY=local-dev
  # in your .env to point the CLI at this local instance.
  rest:
    image: postgrest/postgrest:v12.2.3
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGRST_DB_URI: postgres://postgres:postgres@db:5432/bank_transactions
      PGRST_DB_SCHEMA: public
      PGRST_DB_ANON_ROLE: postgres
    ports:
      - "3000:3000"

volumes:
  postgres_data:
